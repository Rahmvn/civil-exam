name: Quality gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:security
      - run: npm run test:unit:coverage

  database-and-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: supabase start
      - run: supabase db reset
      - run: npm run test:db
      - run: npm run test:edge
      - run: npm run test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            .playwright-results
          if-no-files-found: ignore
          retention-days: 14

  nightly-load:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [static-and-unit, database-and-browser]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1
      - run: npm ci
      - run: supabase start
      - run: supabase db reset
      - run: npm run test:load:full
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: test-results/load-test-report.json
          if-no-files-found: error
          retention-days: 30
