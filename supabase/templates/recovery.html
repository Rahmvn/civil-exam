<!doctype html>
<html lang="en">
  <body style="margin:0;background:#f4f7f2;color:#10261d;font-family:Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #d8e2dc;border-radius:18px;padding:32px;">
            <tr><td style="font-size:14px;font-weight:700;color:#0b6542;">PromotionSure</td></tr>
            <tr><td><h1 style="margin:18px 0 8px;font-size:25px;line-height:1.2;">Reset your password</h1></td></tr>
            <tr><td><p style="margin:0 0 22px;line-height:1.6;color:#53655e;">Enter this six-digit code in PromotionSure to continue securely.</p></td></tr>
            <tr><td align="center" style="padding:18px;background:#eef7f1;border-radius:14px;font-size:32px;font-weight:800;letter-spacing:8px;color:#0b6542;">{{ .Token }}</td></tr>
            <tr><td><p style="margin:22px 0 0;line-height:1.6;color:#53655e;">Use only the latest code. If you did not request a password reset, secure your email account and ignore this message.</p></td></tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
