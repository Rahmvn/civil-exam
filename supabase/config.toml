project_id = "civil-exam-app"

[api]
port = 55421

[db]
port = 55422

[db.pooler]
port = 55429

[studio]
port = 55423

[inbucket]
port = 55424

[analytics]
port = 55427

[functions.initialize-paystack-payment]
enabled = true
verify_jwt = false

[functions.verify-paystack-payment]
enabled = true
verify_jwt = false

[functions.admin-reconcile-support-payment]
enabled = true
verify_jwt = false

# Authentication is enforced inside the candidate functions so publishable
# API keys work with current JWT signing keys. Paystack authenticates webhooks
# with the signature over the raw request body.
[functions.paystack-webhook]
enabled = true
verify_jwt = false
[auth]
enabled = true
site_url = "http://127.0.0.1:4173"
additional_redirect_urls = [
  "http://127.0.0.1:4173/auth/callback",
  "http://localhost:4173/auth/callback",
]

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = false
max_frequency = "1m"
otp_length = 6
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "Your PromotionSure verification code"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Your PromotionSure password recovery code"
content_path = "./supabase/templates/recovery.html"
